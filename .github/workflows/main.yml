name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Updated to v4 for better performance and features | Was v3 before

      # Day 3 part
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install Dependencies
        run: npm install
      
      - name: Run Tests
        run: npm test
      
      # Day 5 part
      - name: Use Secret
        run: echo "Secret stored safely"
        env:
          API_KEY: ${{ secrets.API_KEY}}

      - name: Display Success Message
        run: echo "Build Successful!"
      
        # Day 4 part
      - name: Deploy to Github Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
